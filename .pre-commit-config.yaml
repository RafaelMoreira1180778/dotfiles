repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt
        entry: shfmt -i 4 -w
        language: system
        files: (^|/)(\.zshenv|\.zprofile|\.zshrc|[^/]+\.sh|[^/]+\.zsh|[^/]+\.zshenv|[^/]+\.zprofile|[^/]+\.zshrc)$
